<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <img src="img/cw_logo-horizontal.png" alt="charity: water" class="cw-logo">
        <h1 class="game-title">Water Drop</h1>
        <p class="game-tagline">Catch the good drops, avoid the bad ones!</p>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">30</span>s</div>
            <div class="goal">Goal: <span id="goal">20</span> drops</div>
            <div class="button-group">
                <button id="reset-btn" type="button">Reset</button>
                <button id="start-btn">Start Game</button>
            </div>
        </div>

        <div class="difficulty-panel">
            <span class="difficulty-label">Difficulty:</span>
            <div class="difficulty-group">
                <button class="difficulty-btn" data-level="easy" type="button">Easy</button>
                <button class="difficulty-btn active" data-level="normal" type="button">Normal</button>
                <button class="difficulty-btn" data-level="hard" type="button">Hard</button>
            </div>
        </div>
        
        <div id="game-container">
        </div>

        <footer class="game-footer">
            <p>This game was inspired by the mission of <a href="https://www.charitywater.org/" target="_blank" rel="noopener noreferrer">charity: water</a> — helping bring clean and safe drinking water to people in need around the world.</p>
            <a class="donate-link" href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer">Donate to charity: water</a>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
